name: Deploy to Server

on:
  push:
    branches: [master] # Adjust branch name as needed

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 65.108.95.112
          username: arvigeus
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/arvigeus/arvigeus.one

            # Check if repository is dirty (has uncommitted changes)
            if ! git diff-index --quiet HEAD --; then
              echo "ERROR: Repository has uncommitted changes!"
              echo "Uncommitted files:"
              git status --porcelain
              echo ""
              echo "Please commit or stash changes before deploying:"
              echo "  git add . && git commit -m 'Manual changes' && git push"
              echo "  OR: git stash"
              exit 1
            fi

            # Check if there are untracked files
            if [ -n "$(git ls-files --others --exclude-standard)" ]; then
              echo "WARNING: Repository has untracked files:"
              git ls-files --others --exclude-standard
              echo ""
              echo "Consider adding these files to .gitignore or committing them"
              echo "Continuing deployment..."
            fi

            # Fetch latest changes
            echo "Fetching latest changes..."
            git fetch origin master

            # Check if we're behind
            LOCAL=$(git rev-parse HEAD)
            REMOTE=$(git rev-parse origin/master)

            if [ "$LOCAL" = "$REMOTE" ]; then
              echo "Repository is already up to date"
              exit 0
            fi

            # Check what will change before pulling
            CHANGED_FILES=$(git diff --name-only HEAD origin/master)
            CHANGED_SERVICES=$(echo "$CHANGED_FILES" | grep '^services/' | cut -d/ -f2 | sort -u | tr '\n' ' ')

            REMOVED_SERVICES=""
            for service in $CHANGED_SERVICES; do
              if ! git cat-file -e "origin/master:services/$service" 2>/dev/null; then
                REMOVED_SERVICES="$REMOVED_SERVICES $service"
              fi
            done

            if [ -n "$REMOVED_SERVICES" ]; then
              echo "Stopping removed services before pulling:$REMOVED_SERVICES"
              # shellcheck disable=SC2086
              if ! ./run.sh stop $REMOVED_SERVICES; then
                echo "ERROR: Failed to stop removed services"
                exit 1
              fi
            fi

            # Attempt to pull
            echo "Pulling changes..."
            if ! git pull origin master; then
              echo "Git pull failed - there may be merge conflicts"
              echo "Manual intervention required on server"
              exit 1
            fi

            ACTIVE_CHANGED_SERVICES=""
            for service in $CHANGED_SERVICES; do
              if [ -d "services/$service" ]; then
                ACTIVE_CHANGED_SERVICES="$ACTIVE_CHANGED_SERVICES $service"
              fi
            done

            if [ -n "$ACTIVE_CHANGED_SERVICES" ]; then
              echo "Updating changed services:$ACTIVE_CHANGED_SERVICES"
              # shellcheck disable=SC2086
              if ! ./run.sh update $ACTIVE_CHANGED_SERVICES; then
                echo "ERROR: Failed to update changed services"
                exit 1
              fi
            else
              echo "No active service changes detected, skipping update"
            fi

            if ! ./run.sh prune-stale; then
              echo "ERROR: Failed to prune stale containers"
              exit 1
            fi

            # Reload Caddy if any caddy.conf changed but the caddy container itself
            # wasn't recreated (mount-only changes don't trigger compose to restart it)
            if echo "$CHANGED_FILES" | grep -qE '^services/[^/]+/caddy\.conf$|^services/caddy/config/'; then
              if ! echo " $ACTIVE_CHANGED_SERVICES " | grep -q ' caddy '; then
                echo "Caddy config changed, reloading Caddy..."
                if ! docker exec caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile; then
                  echo "ERROR: Failed to reload Caddy"
                  exit 1
                fi
              fi
            fi

            # Smoke test every active HTTP endpoint so stale or broken services
            # are caught even when the current push only removed a service.
            if ! ./run.sh smoke; then
              echo "ERROR: Smoke test failed"
              exit 1
            fi
            echo "Deployment successful!"
