services:
  opencode:
    image: ghcr.io/anomalyco/opencode:1.17.9
    container_name: opencode
    hostname: opencode
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    environment:
      - HOME=/home/opencode
      - OPENCODE_SERVER_USERNAME=${USER}
      - OPENCODE_SERVER_PASSWORD=${PASSWORD}
    volumes:
      - ${DATA}/opencode/home:/home/opencode
      - ${OPENCODE_WORKSPACE}:/workspace
    working_dir: /workspace
    command: ["web", "--hostname", "0.0.0.0", "--port", "4096"]

networks:
  default:
    external: true
    name: ${DOCKER_NETWORK}
