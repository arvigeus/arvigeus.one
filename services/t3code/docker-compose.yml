services:
  t3code:
    image: arvigeus/t3code-server:0.0.25
    container_name: t3code
    restart: unless-stopped
    hostname: t3code
    environment:
      T3CODE_PUBLIC_URL: https://t3code.${DOMAIN}
      T3CODE_PORT: 3773
      T3CODE_HOST: 0.0.0.0
      T3CODE_HOME: /data/t3code
      T3CODE_WORKSPACE: /workspace
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ}
    volumes:
      - ${DATA}/t3code/state:/data/t3code
      - ${DATA}/t3code/home:/home/node
      - ${DATA}/t3code/workspace:/workspace

networks:
  default:
    external: true
    name: ${DOCKER_NETWORK}
