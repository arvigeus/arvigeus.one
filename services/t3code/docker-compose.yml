services:
  t3code:
    image: arvigeus/t3code:0.0.1
    container_name: t3code
    hostname: t3code
    restart: unless-stopped
    environment:
      T3CODE_HOME: /data/t3code
      T3CODE_WORKSPACE: /workspace
      T3CODE_HOST: 0.0.0.0
      T3CODE_PORT: 3773
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      PUID: ${PUID}
      PGID: ${PGID}
    volumes:
      - ${DATA}/t3code/state:/data/t3code
      - ${DATA}/t3code/home:/home/node
      - ${DATA}/t3code/workspace:/workspace

networks:
  default:
    external: true
    name: ${DOCKER_NETWORK}
